name: Validate LOGOS Artifacts

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'ontology/**'
      - 'contracts/**'
      - '.github/workflows/validate-artifacts.yml'
  pull_request:
    paths:
      - 'ontology/**'
      - 'contracts/**'
      - '.github/workflows/validate-artifacts.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  NEO4J_CONTAINER: logos-phase2-test-neo4j
  MILVUS_CONTAINER: logos-phase2-test-milvus

jobs:
  validate-cypher:
    name: Validate Cypher Ontology
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Neo4j for syntax validation
        run: |
          docker run -d --name neo4j-validator \
            -p 7474:7474 -p 7687:7687 \
            -e NEO4J_AUTH=neo4j/neo4jtest \
            -e NEO4J_PLUGINS='["apoc", "n10s"]' \
            neo4j:5.13.0
          
          echo "Waiting for Neo4j to start..."
          timeout 60 bash -c 'until docker exec neo4j-validator cypher-shell -u neo4j -p neo4jtest "RETURN 1;" 2>/dev/null; do sleep 2; done'
          echo "Neo4j is ready"
      
      - name: Cleanup
        if: always()
        run: |
          docker stop neo4j-validator || true
          docker rm neo4j-validator || true

  validate-shacl:
    name: Validate SHACL Shapes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install RDF validation tools
        run: |
          pip install rdflib pyshacl
      
      - name: Validate shacl_shapes.ttl syntax
        run: |
          python3 << 'EOF'
          from rdflib import Graph
          from rdflib.plugins.parsers.notation3 import BadSyntax
          import sys
          
          print("Validating RDF/Turtle syntax for shacl_shapes.ttl...")
          
          try:
              g = Graph()
              g.parse("ontology/shacl_shapes.ttl", format="turtle")
              print(f"✅ SHACL shapes validation passed")
              print(f"   Loaded {len(g)} triples")
              
              # Verify it contains SHACL shapes
              from rdflib.namespace import SH
              shapes = list(g.subjects(predicate=None, object=SH.NodeShape))
              print(f"   Found {len(shapes)} SHACL NodeShapes")
              
              if len(shapes) == 0:
                  print("⚠️  Warning: No SHACL NodeShapes found")
              
          except BadSyntax as e:
              print(f"❌ Turtle syntax error: {e}")
              sys.exit(1)
          except Exception as e:
              print(f"❌ Validation error: {e}")
              sys.exit(1)
          EOF

  validate-openapi:
    name: Validate OpenAPI Contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install OpenAPI validation tools
        run: |
          npm install -g @apidevtools/swagger-cli
      
      - name: Validate OpenAPI contracts (syntax)
        run: |
          for contract in contracts/*.openapi.yaml; do
            echo "Validating $contract ..."
            swagger-cli validate "$contract"
          done
          echo "OpenAPI syntax validation passed"

      - name: Check contracts match service snapshots (drift gate)
        # Fidelity check, NOT just syntax: each contracts/<svc>.openapi.yaml must
        # equal the service's published openapi.yaml (generated from app.openapi()
        # and gated by that service's conformance test). Catches a contract that
        # drifted from the live service - e.g. hand-edited, or a route added to
        # the service but never synced. swagger-cli validate above only proves the
        # contract is well-formed, not that it matches reality.
        #
        # Services without a published openapi.yaml yet are skipped (warning), so
        # this is safe to merge before sophia/apollo are wired. Requires
        # CONTRACTS_SYNC_TOKEN (contents:read on the service repos).
        env:
          GH_TOKEN: ${{ secrets.CONTRACTS_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          services="hermes:c-daly/hermes sophia:c-daly/sophia apollo:c-daly/apollo"
          drift=0
          for entry in $services; do
            svc="${entry%%:*}"; repo="${entry##*:}"
            contract="contracts/$svc.openapi.yaml"
            if [ ! -f "$contract" ]; then
              echo "::notice::$contract not present - skipping"
              continue
            fi
            if ! gh api "repos/$repo/contents/openapi.yaml?ref=main" \
                   -H "Accept: application/vnd.github.raw" > "/tmp/$svc.served.yaml" 2>/dev/null; then
              echo "::warning::$repo has no openapi.yaml on main yet - skipping $svc"
              continue
            fi
            if diff -u "$contract" "/tmp/$svc.served.yaml" > "/tmp/$svc.diff"; then
              echo "$svc: contract matches the live service"
            else
              echo "::error::$contract is out of sync with the $svc service."
              echo "Contracts are not hand-maintained; they sync from each service's"
              echo "openapi.yaml (run 'make openapi' in $repo, land it, then sync-contracts.yml)."
              cat "/tmp/$svc.diff"
              drift=1
            fi
          done
          exit $drift

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-cypher, validate-shacl, validate-openapi]
    if: always()
    permissions:
      contents: read
    
    steps:
      - name: Check validation results
        run: |
          if [ "${{ needs.validate-cypher.result }}" != "success" ]; then
            echo "❌ Cypher validation failed"
            exit 1
          fi
          
          if [ "${{ needs.validate-shacl.result }}" != "success" ]; then
            echo "❌ SHACL validation failed"
            exit 1
          fi
          
          if [ "${{ needs.validate-openapi.result }}" != "success" ]; then
            echo "❌ OpenAPI validation failed"
            exit 1
          fi
          
          echo "## ✅ All Validations Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Validated Artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SHACL Shapes (ontology/shacl_shapes.ttl)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ OpenAPI Contract (contracts/hermes.openapi.yaml)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All canonical LOGOS artifacts are syntactically valid." >> $GITHUB_STEP_SUMMARY
